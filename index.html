  :root {

    --bg-surface:   #0f1a2e;
    --bg-card:      #13213a;
    --bg-card-mkt:  #101d33;
    --bg-hover:     #1a2d48;
    --border-soft:  #1e3354;
    --border-mid:   #2a4570;
    --border-accent:#2563eb;
    --text-bright:  #e8f0fe;
    --text-main:    #c4d4f0;
    --text-muted:   #6a8ab5;
    --text-dim:     #3d5a80;
    --accent-blue:  #4da3f5;
    --accent-blue-dim: #1e3a5f;
    --accent-g2:    #7c6ff7;
    --accent-g2-dim:#1e1a4a;
    --accent-green: #34d399;
    --tag-g2-bg:    #1a1660;
    --tag-g2-text:  #a5b4fc;
    --ip-bg:        #0a1525;
    --ip-text:      #7ab0e8;
    --open-bg:      #0d2240;
    --open-text:    #4da3f5;
    --open-border:  #1e3a5f;
    --search-bg:    #0c1828;
    --search-border:#1e3354;
    --tabs-bg:      #060d1a;
    --tab-active-bg:#0f1a2e;
    --subtab-active:#2563eb;
    --subtab-active-text: #e8f0fe;
    --section-bg:   #0c1828;
    --arrow-color:  #4da3f5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

  body { background: var(--bg-page); color: var(--text-main); min-height: 100vh; }

  header {
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-soft);
    padding: 0.9rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
    box-shadow: 0 1px 0 rgba(37,99,235,0.15);
  }
  .logo { font-size: 1.15rem; font-weight: 700; color: var(--text-bright); display: flex; align-items: center; gap: 0.5rem; letter-spacing: -0.01em; }
  .logo-icon { font-size: 1.2rem; }

  .tabs { display: flex; background: var(--tabs-bg); padding: 3px; border-radius: 8px; border: 1px solid var(--border-soft); gap: 2px; }
  .tab {
    padding: 0.45rem 1.4rem; border: none; background: transparent;
    color: var(--text-muted); cursor: pointer; border-radius: 6px; font-weight: 600; font-size: 0.88rem;
    transition: all 0.2s; letter-spacing: 0.01em;
  }
  .tab:hover { color: var(--text-main); background: rgba(77,163,245,0.07); }
  .tab.active { background: var(--tab-active-bg); color: var(--accent-blue); border: 1px solid var(--border-mid); }

  .sub-tabs-container { margin-bottom: 1.25rem; }
  .sub-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; padding-bottom: 1rem; border-bottom: 1px solid var(--border-soft); }
  .sub-tab {
    padding: 0.4rem 1rem; background: var(--bg-card); border: 1px solid var(--border-soft);
    color: var(--text-muted); cursor: pointer; border-radius: 6px; font-weight: 500; font-size: 0.82rem;
    transition: all 0.2s;
  }
  .sub-tab:hover { background: var(--bg-hover); color: var(--accent-blue); border-color: var(--border-mid); }
  .sub-tab.active { background: var(--subtab-active); color: var(--subtab-active-text); border-color: var(--subtab-active); }

  .torre-content { display: none; }
  .torre-content.active { display: block; }

  .container { max-width: 1400px; margin: 0 auto; padding: 1.25rem; }

  .search-wrap { margin-bottom: 1.25rem; position: relative; }
  .search-input {
    width: 100%; padding: 0.7rem 1rem 0.7rem 2.6rem;
    border-radius: 8px; border: 1px solid var(--search-border);
    background: var(--search-bg); color: var(--text-bright);
    font-size: 0.92rem; outline: none; transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--border-mid); }
  .search-input::placeholder { color: var(--text-dim); }
  .search-icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; }

  .section { margin-bottom: 1rem; background: var(--section-bg); border-radius: 10px; border: 1px solid var(--border-soft); overflow: hidden; }
  .section-header {
    padding: 0.85rem 1.1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    font-weight: 600; font-size: 0.95rem; color: var(--text-bright); user-select: none;
    border-bottom: 1px solid transparent; transition: background 0.15s;
  }
  .section-header:hover { background: var(--bg-hover); }
  .section.open .section-header { border-bottom-color: var(--border-soft); }
  .arrow { transition: transform 0.3s; color: var(--arrow-color); font-size: 0.7rem; }
  .section.open .arrow { transform: rotate(180deg); }
  .section-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
  .section.open .section-content { max-height: 2000px; transition: max-height 0.6s ease-in; }
  .inner-grid { padding: 0.9rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 0.75rem; }

  .mkt-card {
    background: var(--bg-card-mkt);
    border: 1px solid var(--border-soft);
    border-radius: 8px; padding: 0.75rem;
    display: flex; flex-direction: column; gap: 0.55rem;
    transition: border-color 0.2s;
  }
  .mkt-card:hover { border-color: var(--border-mid); }
  .mkt-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .mkt-name { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: var(--text-bright); letter-spacing: 0.02em; }
  .g2-tag { background: var(--tag-g2-bg); color: var(--tag-g2-text); font-size: 0.62rem; padding: 0.15rem 0.45rem; border-radius: 4px; font-weight: 700; letter-spacing: 0.05em; border: 1px solid rgba(165,180,252,0.2); }

  .ip-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--ip-bg); padding: 0.45rem 0.6rem; border-radius: 6px;
    border: 1px solid var(--border-soft);
  }
  .ip-text { display: flex; align-items: center; gap: 0.4rem; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.82rem; color: var(--ip-text); }
  .copy-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.68rem; transition: color 0.2s; font-weight: 600; letter-spacing: 0.03em; }
  .copy-btn:hover { color: var(--accent-blue); }

  .open-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    background: var(--open-bg); color: var(--open-text);
    border: 1px solid var(--open-border);
    padding: 0.45rem; border-radius: 6px; text-decoration: none; font-size: 0.82rem; font-weight: 600;
    transition: all 0.2s;
  }
  .open-btn:hover { background: rgba(77,163,245,0.12); border-color: rgba(77,163,245,0.4); }

  .std-card {
    background: var(--bg-card); border: 1px solid var(--border-soft); border-radius: 8px; padding: 0.75rem;
    display: flex; flex-direction: column; gap: 0.45rem; transition: border-color 0.2s;
  }
  .std-card:hover { border-color: var(--border-mid); }
  .std-name { font-weight: 600; font-size: 0.9rem; color: var(--text-bright); }
  .std-ip {
    font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.78rem; color: var(--ip-text);
    background: var(--ip-bg); padding: 0.3rem 0.5rem; border-radius: 5px;
    display: inline-block; width: fit-content; border: 1px solid var(--border-soft);
  }
  .std-desc { font-size: 0.73rem; color: var(--text-muted); }
  .std-link { font-size: 0.8rem; color: var(--accent-blue); text-decoration: none; margin-top: auto; opacity: 0.85; transition: opacity 0.15s; }
  .std-link:hover { opacity: 1; }

  .sect-name { cursor: help; border-bottom: 1px dashed rgba(77,163,245,0.4); }
  .sect-tooltip {
    position: fixed; background: #07101f; color: var(--text-main);
    padding: 0.7rem 0.9rem; border-radius: 8px; font-size: 0.78rem;
    max-width: 320px; z-index: 1000; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    border: 1px solid var(--border-mid); pointer-events: none;
    white-space: pre-wrap; word-break: break-word; line-height: 1.5;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }

  .hidden { display: none !important; }
  @keyframes fadeUp { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @media(max-width: 640px) {
    header { flex-direction: column; align-items: flex-start; }
    .tabs { width: 100%; overflow-x: auto; }
    .sub-tabs { overflow-x: auto; flex-wrap: nowrap; }
  }
</style>

    { name: "SECT-2 (REMEDIOS)", ip: "172.16.32.3", desc: "REMEDIOS" },
    { name: "REMEDIOS", ip: "172.16.32.6" },
    { name: "ESPERANZA", ip: "172.16.32.8" }
  ]}
];

function extractSectorNames(nameStr) {
  const match = nameStr.match(/\(([^)]+)\)/);
  if (match) return match[1].replace(/\|/g, '\n• ').replace(/\/\s*/g, '\n• ');
  return null;
}

function processSECTName(item) {
  const namesInside = extractSectorNames(item.name);
  if (namesInside && item.name.match(/SECT-\d+/i)) {
    const cleanName = item.name.replace(/\s*\([^)]*\)/, '');
    return { ...item, displayName: cleanName, tooltipContent: `📡 Comunidades:\n• ${namesInside}`, hasTooltip: true };
  }
  return { ...item, displayName: item.name, hasTooltip: false };
}

function renderCard(item, isMkt) {
  const p = processSECTName(item);
  if (isMkt) {
    return `<div class="mkt-card">
      <div class="mkt-header">
        <span class="mkt-name${p.hasTooltip ? ' sect-name' : ''}"${p.hasTooltip ? ` data-tooltip="${p.tooltipContent.replace(/"/g,'&quot;')}"` : ''}>${p.displayName}</span>
        <span class="g2-tag">G2</span>
      </div>
      <div class="ip-row">
        <div class="ip-text">📍 ${item.ip}</div>
        <button class="copy-btn" onclick="copyToClipboard('${item.ip}', this)">Copiar</button>
      </div>
      <a href="http://${item.ip}" target="_blank" class="open-btn">🌐 Abrir</a>
    </div>`;
  }
  return `<div class="std-card">
    <div class="std-name${p.hasTooltip ? ' sect-name' : ''}"${p.hasTooltip ? ` data-tooltip="${p.tooltipContent.replace(/"/g,'&quot;')}"` : ''}>${p.displayName}</div>
    <div class="std-ip">📍 ${item.ip}</div>
    ${item.desc ? `<div class="std-desc">${item.desc}</div>` : ''}
    <a href="http://${item.ip}" target="_blank" class="std-link">🌐 Abrir</a>
  </div>`;
}

function renderSections(data, targetId, filter = '') {
  const container = document.getElementById(targetId);
  let html = '', hasResults = false;
  data.forEach(section => {
    const items = section.items.filter(i =>
      i.name.toLowerCase().includes(filter) || i.ip.includes(filter) || (i.desc||'').toLowerCase().includes(filter)
    );
    if (items.length) {
      hasResults = true;
      html += `<div class="section open">
        <div class="section-header" onclick="this.parentElement.classList.toggle('open')">
          <span>${section.title}</span><span class="arrow">▼</span>
        </div>
        <div class="section-content"><div class="inner-grid">
          ${items.map(i => renderCard(i, section.isMkt)).join('')}
        </div></div>
      </div>`;
    }
  });
  if (!hasResults) html = '<div style="text-align:center;padding:2.5rem;color:var(--text-muted);font-size:0.9rem">Sin resultados para esta búsqueda</div>';
  container.innerHTML = html;
  initTooltips();
}

function renderAllTorres(filter = '') {
  renderSections(torreRima51,  'torre-rima51',  filter);
  renderSections(torreRima170, 'torre-rima170', filter);
  renderSections(torreRicu46,  'torre-ricu46',  filter);
  renderSections(torreRicu132, 'torre-ricu132', filter);
  renderSections(torreCore,    'torre-core',    filter);
}

function initTooltips() {
  let activeTooltip = null;
  document.querySelectorAll('.sect-name').forEach(el => {
    el.addEventListener('mouseenter', e => {
      const txt = e.target.getAttribute('data-tooltip');
      if (!txt) return;
      activeTooltip = document.createElement('div');
      activeTooltip.className = 'sect-tooltip';
      activeTooltip.innerHTML = txt.replace(/\\n/g,'<br>');
      document.body.appendChild(activeTooltip);
      pos(e);
    });
    el.addEventListener('mousemove', e => { if (activeTooltip) pos(e); });
    el.addEventListener('mouseleave', () => { if (activeTooltip) { activeTooltip.remove(); activeTooltip = null; } });
  });
  function pos(e) {
    if (!activeTooltip) return;
    activeTooltip.style.left = (e.clientX + 15) + 'px';
    activeTooltip.style.top  = (e.clientY + 15) + 'px';
    const r = activeTooltip.getBoundingClientRect();
    if (r.right > window.innerWidth)  activeTooltip.style.left = (e.clientX - r.width - 5) + 'px';
    if (r.bottom > window.innerHeight) activeTooltip.style.top  = (e.clientY - r.height - 5) + 'px';
  }
}

function switchSite(site, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const filter = document.getElementById('search').value.toLowerCase();
  if (site === 'g1') {
    document.getElementById('content-g2').classList.add('hidden');
    document.getElementById('content-g1').classList.remove('hidden');
    renderSections(dataG1, 'content-g1', filter);
  } else {
    document.getElementById('content-g1').classList.add('hidden');
    document.getElementById('content-g2').classList.remove('hidden');
    renderAllTorres(filter);
  }
}

function handleSearch() {
  const val = document.getElementById('search').value.toLowerCase();
  if (!document.getElementById('content-g1').classList.contains('hidden')) renderSections(dataG1, 'content-g1', val);
  else renderAllTorres(val);
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text);
  const orig = btn.innerText;
  btn.innerText = '✅';
  setTimeout(() => btn.innerText = orig, 1500);
}

function initSubTabs() {
  document.querySelectorAll('.sub-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.torre-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.getAttribute('data-torre')).classList.add('active');
      renderAllTorres(document.getElementById('search').value.toLowerCase());
    });
  });
}

renderSections(dataG1, 'content-g1');
renderAllTorres('');
document.getElementById('content-g2').classList.add('hidden');
initSubTabs();
</script>
